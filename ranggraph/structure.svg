<svg width="100%" viewBox="0 0 680 570" role="img" xmlns="http://www.w3.org/2000/svg">
<title>ranggraph (8주차) 구조도</title>
<desc>인덱싱 파이프라인은 이전 단계와 동일하고, 쿼리 단계가 고정 파이프라인 대신 agent 노드와 tools 노드가 서로를 오가는 ReAct 에이전트 루프로 바뀐 구조. LLM이 도구가 더 필요한지 스스로 판단해서 반복하거나 답변으로 종료한다.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect width="680" height="570" fill="#ffffff"/>

