<text x="545" y="112" text-anchor="middle" font-size="12" fill="#0C447C">Document+HF 임베딩</text>

<line x1="230" y1="100" x2="245" y2="100" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="435" y1="100" x2="450" y2="100" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
