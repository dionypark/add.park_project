<text x="40" y="66" font-size="12" fill="#5F5E5A">인덱싱 파이프라인 · rangchain과 동일 · 최초 1회</text>

<rect x="40" y="70" width="190" height="60" rx="4" fill="#E6F1FB" stroke="#378ADD"/>
