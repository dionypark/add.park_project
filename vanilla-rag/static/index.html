<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AWS 서비스 선택/비용 최적화 어드바이저</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; background: #f7f7f5; }
  h1 { font-size: 18px; }
  #log { display: flex; flex-direction: column; gap: 16px; margin-bottom: 16px; }
  .msg { padding: 12px 14px; border-radius: 8px; line-height: 1.6; white-space: pre-wrap; }
  .msg.user { background: #dbeafe; align-self: flex-end; max-width: 80%; }
  .msg.bot { background: #ffffff; border: 1px solid #ddd; }
  .sources { margin-top: 8px; font-size: 12px; color: #666; }
  form { display: flex; gap: 8px; position: sticky; bottom: 16px; }
  input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
  button { padding: 10px 16px; border: none; border-radius: 6px; background: #111; color: #fff; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
<h1>AWS 서비스 선택 / 비용 최적화 어드바이저 (프로토타입)</h1>
<div id="log"></div>
<form id="form">
  <input id="question" placeholder="예: 트래픽 적은 개인 프로젝트인데 뭐 써야해?" autocomplete="off">
  <button id="submit" type="submit">전송</button>
</form>
<script>
const log = document.getElementById('log');
const form = document.getElementById('form');
const input = document.getElementById('question');
const submitBtn = document.getElementById('submit');

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  log.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
  return div;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const question = input.value.trim();
  if (!question) return;

  addMessage('user', question);
  input.value = '';
  submitBtn.disabled = true;
  const botDiv = addMessage('bot', '생각 중...');

  try {
    const res = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      botDiv.textContent = '오류: ' + (err.detail || res.status);
      return;
    }
    const data = await res.json();
    botDiv.textContent = data.answer;
    if (data.sources && data.sources.length) {
      const src = document.createElement('div');
      src.className = 'sources';
      src.textContent = '출처: ' + data.sources.map(s => `${s.source} (${s.header})`).join(', ');
      botDiv.appendChild(src);
    }
  } catch (err) {
    botDiv.textContent = '오류: ' + err.message;
  } finally {
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
